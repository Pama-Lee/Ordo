# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Only check dependencies for the default target
targets = []

# ------------------------------------------------------------------------
# Security advisories
# ------------------------------------------------------------------------
[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Deny crates with known security vulnerabilities
vulnerability = "deny"
# Warn on unmaintained crates (not deny, to avoid blocking on inactive-but-safe deps)
unmaintained = "warn"
# Warn on crates that have been yanked
yanked = "warn"
# Warn on crates with security notices (informational advisories)
notice = "warn"

# ------------------------------------------------------------------------
# License checks
# ------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

# Allow these licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
]

# Deny GPL and other copyleft licenses
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "AGPL-3.0",
]

# ------------------------------------------------------------------------
# Crate bans
# ------------------------------------------------------------------------
[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Deny wildcard dependencies
wildcards = "deny"
# Highlight the longest path each duplicate dependency takes
highlight = "deepest-path"

# ------------------------------------------------------------------------
# Source checks
# ------------------------------------------------------------------------
[sources]
# Only allow crates from crates.io and git sources
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
